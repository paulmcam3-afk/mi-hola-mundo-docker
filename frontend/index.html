<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi App en Container</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>¡Publica tu Saludo! 🌟</h1>
    
    <div class="form-container">
        <input type="text" id="nuevo-saludo" placeholder="Escribe algo aquí...">
        <button onclick="enviarSaludo()">Publicar en la Nube</button>
    </div>

    <div id="mensaje-servidor">Cargando saludos...</div>

    <script>
        const API_URL = 'https://mi-backend-fzcf.onrender.com';

        // 1. FUNCIÓN PARA LEER (GET)
        function cargarSaludo() {
            fetch(`${API_URL}/saludo`)
                .then(res => res.text())
                .then(data => document.getElementById('mensaje-servidor').innerText = data);
        }

        // 2. FUNCIÓN PARA ENVIAR (POST)
        function enviarSaludo() {
            const texto = document.getElementById('nuevo-saludo').value;
            
            fetch(`${API_URL}/nuevo`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ texto: texto })
            })
            .then(res => res.text())
            .then(data => {
                alert(data);
                document.getElementById('nuevo-saludo').value = ''; // Limpiar input
                cargarSaludo(); // Recargar la lista
            });
        }

        // Cargar al iniciar
        cargarSaludo();
    </script>
</body>
</html>
