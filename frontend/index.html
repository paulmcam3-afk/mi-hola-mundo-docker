<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mi App Full Stack</title>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-4 text-blue-600">¡Libro de Visitas! 🌟</h1>
        
        <input type="text" id="nuevo-saludo" class="w-full border p-2 mb-2 rounded" placeholder="Escribe aquí...">
        <button onclick="enviarSaludo()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Publicar</button>

        <ul id="lista-saludos" class="mt-6 space-y-2">
            </ul>
    </div>

    <script>
        const API_URL = 'https://mi-backend-fzcf.onrender.com';

    async function cargarSaludos() {
        try {
            const res = await fetch(`${API_URL}/saludos`);
            // CAMBIO AQUÍ: Usamos .json() porque el backend envía un array
            const data = await res.json(); 
            
            const lista = document.getElementById('lista-saludos');
            
            // Mapeamos los datos para crear los elementos de la lista
            lista.innerHTML = data.map(s => `
                <li class="bg-gray-50 p-3 mb-2 border-l-4 border-blue-500 rounded shadow-sm text-gray-700">
                    ${s.texto}
                </li>
            `).join('');
        } catch (error) {
            console.error("Error cargando saludos:", error);
        }
    }

        async function enviarSaludo() {
            const texto = document.getElementById('nuevo-saludo').value;
            await fetch(`${API_URL}/nuevo`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ texto })
            });
            document.getElementById('nuevo-saludo').value = '';
            cargarSaludos();
        }

        cargarSaludos();
    </script>
</body>
</html>
